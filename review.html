<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueLink — Review Corrections</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: #0b0f1a; color: #e4e7f0; margin: 0; padding: 40px 20px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .sub { color: #565d75; font-size: 13px; margin-bottom: 24px; }
    .card {
        background: #12172a; border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; max-width: 720px;
    }
    .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #7b8ba3; margin-bottom: 4px; }
    .q { font-size: 14px; margin-bottom: 12px; }
    .old-answer { font-size: 13px; color: #ff9b9b; margin-bottom: 12px; }
    .correction { font-size: 13px; color: #4ade80; margin-bottom: 16px; }
    .btns { display: flex; gap: 10px; }
    button {
        border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px;
        font-weight: 600; cursor: pointer;
    }
    .approve { background: #4ade80; color: #0b0f1a; }
    .reject { background: rgba(255,90,90,0.15); color: #ff9b9b; border: 1px solid rgba(255,90,90,0.3); }
    .empty { color: #565d75; font-size: 14px; }
</style>
</head>
<body>

<h1>Review Corrections</h1>
<div class="sub">Approve to teach Aurea permanently, reject to discard.</div>
<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://vfolauskglbihqmlyqlt.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmb2xhdXNrZ2xiaWhxbWx5cWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MjU1NjgsImV4cCI6MjA5ODIwMTU2OH0.vXF77v3dCDjHFAhF7bBXxPEQ2tY6h8JNdJDmbuEiIHI'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    async function loadCorrections() {
        const { data, error } = await db
            .from('corrections')
            .select('*')
            .eq('status', 'pending')
            .order('created_at', { ascending: false })

        const list = document.getElementById('list')
        list.innerHTML = ''

        if (!data || data.length === 0) {
            list.innerHTML = '<div class="empty">No pending corrections right now.</div>'
            return
        }

        data.forEach(row => {
            const card = document.createElement('div')
            card.className = 'card'
            card.innerHTML = `
                <div class="label">User asked</div>
                <div class="q">${escapeHtml(row.question)}</div>
                <div class="label">Aurea said</div>
                <div class="old-answer">${escapeHtml(row.aurea_answer)}</div>
                <div class="label">Correction</div>
                <div class="correction">${escapeHtml(row.user_correction)}</div>
                <div class="btns">
                    <button class="approve" onclick="approve(${row.id}, '${escapeAttr(row.question)}', '${escapeAttr(row.user_correction)}')">Approve — teach Aurea</button>
                    <button class="reject" onclick="reject(${row.id})">Reject</button>
                </div>
            `
            list.appendChild(card)
        })
    }

    function escapeHtml(s) {
        return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
    }
    function escapeAttr(s) {
        return (s || '').replace(/'/g, "\\'")
    }

    async function approve(id, question, correction) {
        await db.from('taught_facts').insert({ question, answer: correction })
        await db.from('corrections').update({ status: 'approved' }).eq('id', id)
        loadCorrections()
    }

    async function reject(id) {
        await db.from('corrections').update({ status: 'rejected' }).eq('id', id)
        loadCorrections()
    }

    loadCorrections()
</script>
</body>
</html>
