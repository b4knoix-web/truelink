<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueLink — Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /* BACKGROUND */
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('Truelinkbg.png') center center / cover no-repeat;
            z-index: 0;
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.35);
            z-index: 1;
        }

        /* CARD */
        .card {
            position: relative;
            z-index: 2;
            width: 380px;
            text-align: center;
            padding: 40px 32px 32px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
        }

        /* LOGO */
        .logo-area { margin-bottom: 24px; }
        .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
        }
        .logo-icon svg { width: 100%; height: 100%; }
        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: white;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            border: none;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-google {
            background: white;
            color: #333;
        }
        .btn-email {
            background: #111;
            color: white;
        }

        /* EMAIL FORM */
        .email-form { display: none; margin-top: 4px; }
        .email-form.show { display: block; }

        .input-field {
            width: 100%;
            padding: 13px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
            outline: none;
            backdrop-filter: blur(10px);
        }
        .input-field::placeholder { color: rgba(255,255,255,0.6); }
        .input-field:focus { border-color: rgba(255,255,255,0.6); }

        .btn-submit {
            width: 100%;
            padding: 13px;
            border-radius: 50px;
            background: white;
            color: #111;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-submit:hover { opacity: 0.9; }

        .toggle-link {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            margin-bottom: 8px;
            display: block;
            width: 100%;
            text-align: center;
        }
        .toggle-link:hover { color: white; }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0 14px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }

        /* MSG */
        .msg {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }
        .msg.error { background: rgba(220,50,50,0.3); color: #ffaaaa; border: 1px solid rgba(220,50,50,0.4); display: block; }
        .msg.success { background: rgba(50,200,100,0.3); color: #aaffcc; border: 1px solid rgba(50,200,100,0.4); display: block; }

        /* MODE LABEL */
        .mode-label {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 14px;
        }
        .mode-label strong { color: white; font-size: 16px; display: block; margin-bottom: 2px; }

        /* FOOTER */
        .footer-links {
            position: fixed;
            bottom: 20px;
            left: 0; right: 0;
            text-align: center;
            z-index: 2;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
        .footer-links a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            margin: 0 10px;
        }
        .footer-links a:hover { color: white; }

        /* BACK TO HOME */
        .back-home {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 2;
            color: white;
            text-decoration: none;
            font-size: 13px;
            background: rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .back-home:hover { background: rgba(255,255,255,0.25); }

        /* GOOGLE ICON */
        .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
        .email-icon { font-size: 16px; }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>

<a href="index.html" class="back-home">← Home</a>

<div class="card">

    <!-- LOGO -->
    <div class="logo-area">
        <div class="logo-icon">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M25 20 L25 45 Q25 58 38 58 Q51 58 51 45 L51 38" stroke="white" stroke-width="9" stroke-linecap="round" fill="none"/>
                <path d="M51 52 L68 65" stroke="white" stroke-width="9" stroke-linecap="round" fill="none"/>
                <path d="M62 58 L85 58 L70 82 L48 82" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
        </div>
        <div class="logo-text">TrueLink</div>
    </div>

    <div class="msg" id="msg"></div>

    <!-- DEFAULT BUTTONS -->
    <div id="defaultView">
        <div class="mode-label">
            <strong>Welcome Back</strong>
            Sign in to your account
        </div>

        <!-- GOOGLE -->
        <button class="btn btn-google" onclick="loginGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <div class="divider">or</div>

        <!-- EMAIL -->
        <button class="btn btn-email" onclick="showEmailForm('login')">
            <span class="email-icon">✉️</span>
            Continue with email
        </button>

        <div style="margin-top:12px; color:rgba(255,255,255,0.6); font-size:12px;">
            Don't have an account?
            <button class="toggle-link" onclick="showEmailForm('signup')" style="display:inline; width:auto; text-decoration:underline; color:white;">Sign up free</button>
        </div>
    </div>

    <!-- EMAIL FORM -->
    <div class="email-form" id="emailForm">
        <div class="mode-label" id="formLabel">
            <strong id="formTitle">Sign In</strong>
            <span id="formSub">Enter your email and password</span>
        </div>

        <div id="nameFields" style="display:none;">
            <div style="display:flex; gap:8px;">
                <input type="text" class="input-field" id="firstName" placeholder="First Name" style="margin-bottom:10px;">
                <input type="text" class="input-field" id="lastName" placeholder="Last Name" style="margin-bottom:10px;">
            </div>
            <input type="text" class="input-field" id="phone" placeholder="Mobile Number (10 digits)">
        </div>

        <input type="email" class="input-field" id="emailInput" placeholder="Email address">
        <input type="password" class="input-field" id="passwordInput" placeholder="Password">

        <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Sign In</button>
        <button class="toggle-link" id="toggleBtn" onclick="toggleMode()">Don't have an account? Sign up</button>
        <button class="toggle-link" onclick="showDefault()" style="opacity:0.6;">← Back</button>
    </div>

</div>

<div class="footer-links">
    <a href="#">Privacy policy</a> | <a href="#">Terms of service</a>
</div>

<script>
    const SUPABASE_URL = 'https://vfolauskglbihqmlyqlt.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmb2xhdXNrZ2xiaWhxbWx5cWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MjU1NjgsImV4cCI6MjA5ODIwMTU2OH0.vXF77v3dCDjHFAhF7bBXxPEQ2tY6h8JNdJDmbuEiIHI'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    let currentMode = 'login'

    // Check if already logged in
    window.onload = async function() {
        const { data: { user } } = await db.auth.getUser()
        if (user) {
            window.location.href = 'dashboard.html'
        }
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg')
        el.textContent = text
        el.className = 'msg ' + type
        setTimeout(() => { el.className = 'msg'; el.textContent = '' }, 4000)
    }

    async function loginGoogle() {
        const { error } = await db.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: 'https://truelink.qzz.io/dashboard.html'
            }
        })
        if (error) showMsg('Google login failed: ' + error.message, 'error')
    }

    function showEmailForm(mode) {
        document.getElementById('defaultView').style.display = 'none'
        document.getElementById('emailForm').classList.add('show')
        currentMode = mode
        updateFormMode()
    }

    function showDefault() {
        document.getElementById('defaultView').style.display = 'block'
        document.getElementById('emailForm').classList.remove('show')
        document.getElementById('msg').className = 'msg'
    }

    function updateFormMode() {
        if (currentMode === 'login') {
            document.getElementById('formTitle').textContent = 'Sign In'
            document.getElementById('formSub').textContent = 'Enter your email and password'
            document.getElementById('submitBtn').textContent = 'Sign In'
            document.getElementById('toggleBtn').textContent = "Don't have an account? Sign up"
            document.getElementById('nameFields').style.display = 'none'
        } else {
            document.getElementById('formTitle').textContent = 'Create Account'
            document.getElementById('formSub').textContent = 'Fill in your details to get started'
            document.getElementById('submitBtn').textContent = 'Create My TrueLink ID →'
            document.getElementById('toggleBtn').textContent = 'Already have an account? Sign in'
            document.getElementById('nameFields').style.display = 'block'
        }
    }

    function toggleMode() {
        currentMode = currentMode === 'login' ? 'signup' : 'login'
        updateFormMode()
    }

    async function handleSubmit() {
        const email = document.getElementById('emailInput').value.trim()
        const pass = document.getElementById('passwordInput').value

        if (!email || !pass) { showMsg('Please fill in all fields.', 'error'); return; }

        const btn = document.getElementById('submitBtn')
        btn.textContent = 'Please wait...'
        btn.disabled = true

        if (currentMode === 'login') {
            const { error } = await db.auth.signInWithPassword({ email, password: pass })
            if (error) {
                showMsg('Login failed: ' + error.message, 'error')
                btn.textContent = 'Sign In'
                btn.disabled = false
            } else {
                showMsg('Login successful! ✓', 'success')
                setTimeout(() => window.location.href = 'dashboard.html', 1000)
            }
        } else {
            const first = document.getElementById('firstName').value.trim()
            const last = document.getElementById('lastName').value.trim()
            const phone = document.getElementById('phone').value.trim()

            if (!first || !last) { showMsg('Please enter your name.', 'error'); btn.textContent = 'Create My TrueLink ID →'; btn.disabled = false; return; }
            if (pass.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); btn.textContent = 'Create My TrueLink ID →'; btn.disabled = false; return; }

            // Generate TrueLink ID
            const num = Math.floor(1000 + Math.random() * 9000)
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'
            const l1 = letters[Math.floor(Math.random() * 26)]
            const l2 = letters[Math.floor(Math.random() * 26)]
            const tlID = 'TL-' + num + '-' + l1 + l2

            const { data, error } = await db.auth.signUp({
                email, password: pass,
                options: {
                    data: {
                        first_name: first,
                        last_name: last,
                        phone: phone,
                        truelink_id: tlID
                    }
                }
            })

            if (error) {
                showMsg('Signup failed: ' + error.message, 'error')
                btn.textContent = 'Create My TrueLink ID →'
                btn.disabled = false
            } else {
                await db.from('Truelink').insert({
                    email, first_name: first, last_name: last,
                    phone, truelink_id: tlID, trust_score: 0, review_count: 0
                })
                showMsg('Account created! TrueLink ID: ' + tlID + ' ✓', 'success')
                setTimeout(() => window.location.href = 'dashboard.html', 2000)
            }
        }
    }
</script>

</body>
</html>
