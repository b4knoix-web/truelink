<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueLink — Messages</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0b0f1a; height: 100vh; overflow: hidden; }

    .sidebar { background: #12172a; border-right: 1px solid rgba(255,255,255,0.06); }
    .convo-item { transition: background 0.15s; cursor: pointer; }
    .convo-item:hover { background: rgba(255,255,255,0.04); }
    .convo-item.active { background: rgba(79,157,255,0.1); border-left: 3px solid #4f9dff; }

    .aurea-avatar {
        background: linear-gradient(135deg, #4f9dff, #7b5fff);
        box-shadow: 0 0 20px rgba(79,157,255,0.4);
    }
    .pulse-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #4ade80; box-shadow: 0 0 8px #4ade80;
    }

    .chat-area { background: #0b0f1a; }
    .msg-bubble {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 16px;
        font-size: 13.5px;
        line-height: 1.5;
    }
    .msg-bubble.ai {
        background: #1c2340;
        color: #e4e7f0;
        border-bottom-left-radius: 4px;
        align-self: flex-start;
    }
    .msg-bubble.user {
        background: #4f9dff;
        color: white;
        border-bottom-right-radius: 4px;
        align-self: flex-end;
    }
    .msg-bubble.flag {
        background: rgba(255,90,90,0.12);
        border: 1px solid rgba(255,90,90,0.3);
        color: #ff9b9b;
        border-bottom-left-radius: 4px;
        align-self: flex-start;
    }

    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .empty-state { color: #565d75; }
</style>
</head>
<body class="flex text-white">

<!-- SIDEBAR -->
<div class="sidebar w-full max-w-sm flex flex-col h-screen">
    <div class="p-5 border-b border-white/5">
        <div class="flex items-center gap-2 mb-4">
            <svg width="22" height="22" viewBox="0 0 100 100" fill="none">
                <path d="M25 20 L25 45 Q25 58 38 58 Q51 58 51 45 L51 38" stroke="white" stroke-width="10" stroke-linecap="round" fill="none"/>
                <path d="M51 52 L68 65" stroke="white" stroke-width="10" stroke-linecap="round" fill="none"/>
                <path d="M62 58 L85 58 L70 82 L48 82" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span class="font-bold text-sm tracking-widest">TRUELINK</span>
        </div>
        <a href="index.html" class="text-xs text-white/40 hover:text-white">← Back to home</a>
    </div>

    <div class="px-5 py-3 text-xs text-white/40 uppercase tracking-widest">Messages</div>

    <div class="flex-1 overflow-y-auto" id="convoList">
        <!-- AUREA — always pinned -->
        <div class="convo-item active flex items-center gap-3 px-5 py-3" onclick="openAurea()">
            <div class="aurea-avatar w-11 h-11 rounded-full flex items-center justify-center font-bold text-sm relative">
                A
                <span class="pulse-dot absolute -bottom-0.5 -right-0.5 border-2 border-[#12172a]"></span>
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1.5">
                    <span class="font-semibold text-sm">Aurea</span>
                    <span class="text-[9px] bg-blue-500/20 text-blue-300 px-1.5 py-0.5 rounded-full font-medium">AI</span>
                </div>
                <p class="text-xs text-white/40 truncate">TrueLink's trust engine — always on</p>
            </div>
        </div>

        <div class="empty-state text-center text-xs px-5 py-10">
            No other conversations yet.<br>Search a TrueLink ID to start chatting.
        </div>
    </div>
</div>

<!-- CHAT AREA -->
<div class="chat-area flex-1 flex flex-col h-screen">
    <div class="flex items-center gap-3 px-6 py-4 border-b border-white/5">
        <div class="aurea-avatar w-9 h-9 rounded-full flex items-center justify-center font-bold text-xs">A</div>
        <div>
            <div class="font-semibold text-sm">Aurea</div>
            <div class="text-[11px] text-white/40 flex items-center gap-1">
                <span class="pulse-dot"></span> Trust scores · recommendations · real talk
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto chat-scroll px-6 py-5 flex flex-col gap-3" id="chat"></div>

    <div class="flex gap-2 px-6 py-4 border-t border-white/5">
        <input type="text" id="userInput" placeholder="Ask about a TrueLink ID, or just talk..."
            class="flex-1 bg-[#1c2340] border border-white/10 rounded-full px-4 py-3 text-sm outline-none focus:border-blue-400">
        <button onclick="handleSend()" class="bg-blue-500 hover:bg-blue-600 rounded-full px-6 py-3 text-sm font-semibold">Send</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://vfolauskglbihqmlyqlt.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmb2xhdXNrZ2xiaWhxbWx5cWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MjU1NjgsImV4cCI6MjA5ODIwMTU2OH0.vXF77v3dCDjHFAhF7bBXxPEQ2tY6h8JNdJDmbuEiIHI'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    // ---- session id for conversation memory (per-browser, no login yet) ----
    let SESSION_ID = localStorage.getItem('aurea_session_id')
    if (!SESSION_ID) {
        SESSION_ID = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8)
        localStorage.setItem('aurea_session_id', SESSION_ID)
    }

    // ---- rolling in-memory history for this tab (avoids refetch on every message) ----
    const recentHistory = []

    const patternBank = {
        greeting: {
            en: ["Hey! Ask me about anyone's trust score, or just talk.", "Hi. I'll give it to you straight — no sugarcoating here."],
            hi: ["Hey! Kisi ka trust score puchna hai ya bas baat karni hai?", "Namaste. Seedha jawab dungi, ghumaunga nahi."]
        },
        trust_score_query: {
            en: ["{name}'s trust score is {score}/100. Main reasons: {reasons}.", "Looked it up — {name} sits at {score}/100. Here's why: {reasons}."],
            hi: ["{name} ka trust score {score}/100 hai. Wajah: {reasons}.", "Dekh liya — {name} ka score {score}/100 hai, kyunki {reasons}."]
        },
        suspicious_flag: {
            en: ["Straight up — {name} ({id}) shows some red flags: {reasons}. Be careful before you send anything.", "I won't sugarcoat this — {name} ({id}) looks risky. {reasons}."],
            hi: ["Seedha bolu — {name} (ID: {id}) mein red flags hai: {reasons}. Kuch bhejne se pehle sochle.", "Sach bataun — {name} ({id}) risky lag raha hai. {reasons}."]
        },
        safe_confirm: {
            en: ["{name} looks solid — {reasons}. No red flags on record.", "Checked — {name} is clean. {reasons}."],
            hi: ["{name} theek lag raha hai — {reasons}. Koi red flag nahi mila.", "Check kiya — {name} clean hai. {reasons}."]
        },
        unknown: {
            en: ["I don't have data on that yet — ask me about a TrueLink ID, a product recommendation, or just talk."],
            hi: ["Iske baare mein abhi data nahi hai — kisi TrueLink ID, product recommendation, ya bas baat kar sakte hai."]
        },
        // ---- EMOTIONAL LAYER: validate-first, before any advice/data ----
        validate_upset: {
            en: ["Hey, that sounds rough. I'm here — tell me what happened.", "Okay that's not okay. What's going on?"],
            hi: ["Are yaar, ye toh tough hai. Bata kya hua.", "Sun raha hoon, pehle bata kya hua hai."]
        },
        validate_frustrated: {
            en: ["I get why that's annoying you. Let's figure it out together.", "Yeah that would frustrate anyone. Walk me through it."],
            hi: ["Samajh sakta hoon frustrating hai. Chal saath mein dekhte hai.", "Haan gussa aana natural hai. Bata puri baat."]
        },
        validate_excited: {
            en: ["Okay I love this energy — tell me everything!", "Let's go! What happened?"],
            hi: ["Are wah, ye toh badhiya baat hai! Pura bata.", "Mast! Poora kissa sun na."]
        },
        continuity_checkin: {
            en: ["Hey, still on your mind from before? How's it going now?"],
            hi: ["Wahi wali baat abhi tak chal rahi hai kya? Ab kaisa hai?"]
        },
        marketplace_no_results: {
            en: ["I don't have enough verified data on {category} yet — need brands with 25k+ ratings on record."],
            hi: ["{category} ke liye abhi verified data kaafi nahi hai — 25k+ ratings wale brands chahiye record mein."]
        }
    }

    function detectLanguage(text) {
        const hindiWords = ['hai','kya','kaise','nahi','kar','ka','ke','ki','mujhe','tera','mera','bhai','kaun','kitna']
        const lower = text.toLowerCase()
        return hindiWords.filter(w => lower.includes(w)).length >= 1 ? 'hi' : 'en'
    }

    // ---- EMOTIONAL LAYER: cheap keyword-pattern emotion detector, same style as detectLanguage ----
    function detectEmotion(text) {
        const lower = text.toLowerCase()
        const upsetWords = ['sad','upset','dukhi','rona','akela','hurt','broken up','breakup','naraz mujhse','depressed']
        const frustratedWords = ['angry','gussa','frustrat','irritat','pareshan','tang aa gaya','fed up']
        const excitedWords = ['yay','excited','mast','shandar','amazing','best day','khushi','promotion','selected']
        if (upsetWords.some(w => lower.includes(w))) return 'upset'
        if (frustratedWords.some(w => lower.includes(w))) return 'frustrated'
        if (excitedWords.some(w => lower.includes(w))) return 'excited'
        return 'neutral'
    }

    // ---- MARKETPLACE LAYER: rough category extraction from a free-text ask ----
    function extractCategory(text) {
        const lower = text.toLowerCase()
        const stripWords = ['best','recommend','suggest','sabse','achha','badhiya','de','dedo','batao','mujhe','kaunsa','chahiye','ka','ki']
        let words = lower.replace(/[^a-z0-9\u0900-\u097F\s]/g, '').split(/\s+/)
        words = words.filter(w => w && !stripWords.includes(w))
        return words.join(' ').trim()
    }

    function detectIntent(text) {
        const lower = text.toLowerCase()
        if (/^(hi|hello|hey|namaste|yo)\b/.test(lower.trim())) return 'greeting'
        if (lower.includes('tl-') || lower.includes('score') || lower.includes('trust')) return 'trust_score_query'
        if (/(best|recommend|suggest|sabse achha|sabse badhiya|kaunsa lu|kaunsi le)/.test(lower)) return 'marketplace_query'
        if (/(kya hai|what is|who is|kaun hai|kya hota hai)/.test(lower)) return 'general_knowledge'
        if (/(life ka matlab|zindagi|meaning of life|advice do|confused about life|kya karu|life advice|how to deal with)/.test(lower)) return 'life_advice'
        return 'unknown'
    }

    async function mockLookupUser(query) {
        const idMatch = query.toUpperCase().match(/TL-\d{4}-[A-Z]{2}/)
        if (!idMatch) return null

        const { data, error } = await db
            .from('Truelink')
            .select('*')
            .eq('truelink_id', idMatch[0])
            .single()

        if (error || !data) return null

        const flags = []
        if (!data.review_count || data.review_count === 0) flags.push('no_reviews_yet')
        if ((data.trust_score || 0) < 30) flags.push('low_score')

        const reasons_en = data.review_count > 0
            ? data.review_count + ' reviews on record, trust score ' + (data.trust_score || 0) + '/100'
            : 'no reviews yet, account is new'
        const reasons_hi = data.review_count > 0
            ? data.review_count + ' reviews hai, trust score ' + (data.trust_score || 0) + '/100'
            : 'abhi tak koi review nahi hai, naya account hai'

        return {
            id: data.truelink_id,
            name: data.first_name + ' ' + data.last_name,
            score: data.trust_score || 0,
            flags: flags,
            reasons_en: reasons_en,
            reasons_hi: reasons_hi
        }
    }

    function isFlaggedSuspicious(user) { return user.flags && user.flags.length > 0 }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)] }
    function fillTemplate(t, vars) { return t.replace(/\{(\w+)\}/g, function(_, k) { return vars[k] ?? '' }) }

    // ---- confidence phrase for the metacognition-style self-check (no GPU needed, just a rule) ----
    function confidencePhrase(reviewCount, lang) {
        if (reviewCount >= 1000) return lang === 'hi' ? 'Is par mujhe pura bharosa hai.' : "I'm confident about this one."
        if (reviewCount > 0) return lang === 'hi' ? 'Data thoda kam hai, but jitna hai usi pe based hai ye.' : "Limited data, but this is my best read on it."
        return lang === 'hi' ? 'Bahut kam info hai — extra saavdhaan rehna.' : 'Very little to go on here — be extra careful.'
    }

    // ---- LOCATION: cache once per session, ask only when actually needed ----
    let cachedLocation = null
    function getUserLocation() {
        return new Promise(resolve => {
            if (cachedLocation) return resolve(cachedLocation)
            if (!navigator.geolocation) return resolve(null)
            navigator.geolocation.getCurrentPosition(
                pos => { cachedLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; resolve(cachedLocation) },
                () => resolve(null),
                { timeout: 4000 }
            )
        })
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
        const toRad = d => d * Math.PI / 180
        const R = 6371
        const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1)
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2
        return R * 2 * Math.asin(Math.sqrt(a))
    }

    // ---- MARKETPLACE ENGINE ----
    // Expects a Supabase table `brands`: name, category, follower_count, verified (bool),
    // rating_count, avg_rating, lat, lng
    const RATING_THRESHOLD = 25000

    async function getMarketplaceRecommendations(category) {
        const { data: established } = await db
            .from('brands')
            .select('*')
            .eq('category', category)
            .eq('verified', true)
            .gte('rating_count', RATING_THRESHOLD)
            .order('avg_rating', { ascending: false })
            .limit(2)

        const { data: rising } = await db
            .from('brands')
            .select('*')
            .eq('category', category)
            .eq('verified', true)
            .lt('rating_count', RATING_THRESHOLD)
            .gte('follower_count', 5000)
            .order('avg_rating', { ascending: false })
            .limit(1)

        let picks = [...(established || []), ...(rising || [])]
        if (picks.length === 0) return null

        const loc = await getUserLocation()
        if (loc) {
            picks = picks.map(b => ({
                ...b,
                distanceKm: (b.lat != null && b.lng != null) ? haversineKm(loc.lat, loc.lng, b.lat, b.lng) : null
            }))
        }
        return picks
    }

    function formatMarketplaceReply(picks, category, lang) {
        const lines = picks.map((b, i) => {
            const tag = b.rating_count < RATING_THRESHOLD ? (lang === 'hi' ? ' (naya, badhta hua)' : ' (new, rising)') : ''
            const near = b.distanceKm != null ? (lang === 'hi' ? `, ${Math.round(b.distanceKm)}km door` : `, ${Math.round(b.distanceKm)}km away`) : ''
            return `${i+1}. ${b.name}${tag} — ${b.avg_rating}/5 (${b.rating_count} ratings)${near}`
        }).join('\n')
        const intro = lang === 'hi' ? `${category} ke liye ye mile:` : `Here's what I found for ${category}:`
        return intro + '\n' + lines
    }

    // ---- WEB SEARCH FALLBACK (Wikipedia REST — CORS-friendly, no key needed) ----
    // For a real search engine (Google/DuckDuckGo) a Supabase Edge Function proxy is
    // needed since those APIs block direct browser calls (CORS) — swap the fetch URL
    // there once that proxy exists.
    // ---- OWN LLM FALLBACK: b4knoix/AURYN-v0.1 via Supabase Edge Function (keeps HF token server-side) ----
    async function askAuryn(prompt) {
        try {
            const res = await fetch(SUPABASE_URL + '/functions/v1/auryn-inference', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            })
            if (!res.ok) return null
            const data = await res.json()
            return data.text ? data.text.trim() : null
        } catch (e) {
            return null
        }
    }

    async function searchWeb(query) {
        try {
            const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(query))
            if (!res.ok) return null
            const json = await res.json()
            return json.extract || null
        } catch (e) {
            return null
        }
    }

    // ---- BOOK-INSIGHTS LAYER: wisdom pulled from public-domain classics ----
    async function getBookInsight(userText) {
        const stopWords = ['life','ka','matlab','zindagi','meaning','of','advice','do','confused','about','kya','karu','how','to','deal','with']
        const words = userText.toLowerCase().replace(/[^a-z0-9\u0900-\u097F\s]/g, '').split(/\s+/)
        const keyword = words.filter(w => w.length > 3 && !stopWords.includes(w))[0]

        let query = db.from('book_insights').select('insight_text, title')
        query = keyword ? query.ilike('insight_text', `%${keyword}%`) : query
        const { data } = await query.limit(20)

        if (!data || data.length === 0) {
            // fall back to any random insight rather than nothing
            const { data: any } = await db.from('book_insights').select('insight_text, title').limit(50)
            if (!any || any.length === 0) return null
            const pickAny = any[Math.floor(Math.random() * any.length)]
            return `${pickAny.insight_text} — ${pickAny.title}`
        }
        const picked = data[Math.floor(Math.random() * data.length)]
        return `${picked.insight_text} — ${picked.title}`
    }

    // ---- REAL-HUMAN EMOTIONAL PHRASING: pulls an authentic line instead of only static templates ----
    const emotionMap = {
        upset: ['sad', 'lonely', 'devastated', 'disappointed', 'grieving'],
        frustrated: ['angry', 'annoyed', 'furious'],
        excited: ['excited', 'joyful', 'proud', 'hopeful']
    }
    async function getHumanEmotionPhrase(emotion) {
        const labels = emotionMap[emotion]
        if (!labels) return null
        const { data } = await db
            .from('emotion_conversations')
            .select('human_response')
            .in('emotion', labels)
            .limit(50)
        if (!data || data.length === 0) return null
        return data[Math.floor(Math.random() * data.length)].human_response
    }

    // ---- CONVERSATION MEMORY ----
    // Expects a Supabase table `conversation_history`: session_id, user_text, emotion, intent, response, created_at
    async function logConversation(userText, emotion, intent, response) {
        recentHistory.push({ emotion, intent, at: Date.now() })
        if (recentHistory.length > 10) recentHistory.shift()
        try {
            await db.from('conversation_history').insert({
                session_id: SESSION_ID, user_text: userText, emotion, intent, response
            })
        } catch (e) { /* non-fatal — chat still works without memory persistence */ }
    }

    function needsContinuityCheckin(emotion) {
        if (emotion === 'neutral') return false
        const last = recentHistory[recentHistory.length - 1]
        return last && last.emotion === emotion
    }

    // ---- SELF-IMPROVEMENT LOOP (sandboxed, human-approved) ----
    // Expects a Supabase table `suggestions`: id, user_text, language, tag, status
    //   (pending/approved/rejected), proposed_response, created_at
    // Aurea only FLAGS gaps here — nothing gets added to her real responses
    // until a human reviews and approves it on review.html.
    async function logSuggestion(userText, lang) {
        try {
            // avoid spamming duplicate suggestions for the same phrase
            const { data: existing } = await db
                .from('suggestions')
                .select('id')
                .eq('user_text', userText)
                .eq('status', 'pending')
                .limit(1)
            if (existing && existing.length > 0) return

            await db.from('suggestions').insert({
                user_text: userText, language: lang, status: 'pending'
            })
        } catch (e) { /* non-fatal — chat still works without the suggestion log */ }
    }

    async function buildResponse(userText) {
        const lang = detectLanguage(userText)
        const intent = detectIntent(userText)
        const emotion = detectEmotion(userText)

        let result

        if (intent === 'greeting') {
            result = { text: pick(patternBank.greeting[lang]), type: 'ai' }
        } else if (intent === 'trust_score_query') {
            const user = await mockLookupUser(userText)
            if (!user) {
                result = { text: pick(patternBank.unknown[lang]), type: 'ai' }
            } else {
                const reasons = lang === 'hi' ? user.reasons_hi : user.reasons_en
                const confidence = confidencePhrase(user.reasonsCount ?? (user.reasons_en.match(/\d+/) || [0])[0], lang)
                if (isFlaggedSuspicious(user)) {
                    result = { text: fillTemplate(pick(patternBank.suspicious_flag[lang]), { name: user.name, id: user.id, reasons: reasons }) + ' ' + confidence, type: 'flag' }
                } else {
                    result = { text: fillTemplate(pick(patternBank.safe_confirm[lang]), { name: user.name, id: user.id, reasons: reasons }) + ' ' + confidence, type: 'ai' }
                }
            }
        } else if (intent === 'marketplace_query') {
            const category = extractCategory(userText)
            const picks = category ? await getMarketplaceRecommendations(category) : null
            if (!picks) {
                result = { text: fillTemplate(pick(patternBank.marketplace_no_results[lang]), { category: category || '' }), type: 'ai' }
            } else {
                result = { text: formatMarketplaceReply(picks, category, lang), type: 'ai' }
            }
        } else if (intent === 'life_advice') {
            const insight = await getBookInsight(userText)
            result = insight
                ? { text: insight, type: 'ai' }
                : { text: pick(patternBank.unknown[lang]), type: 'ai' }
        } else if (intent === 'general_knowledge') {
            const term = userText.replace(/(kya hai|what is|who is|kaun hai|kya hota hai)/gi, '').trim()
            const summary = term ? await searchWeb(term) : null
            result = summary
                ? { text: summary, type: 'ai' }
                : { text: pick(patternBank.unknown[lang]), type: 'ai' }
        } else {
            // ---- try learned community patterns first ----
            const learned = await getLearnedResponse(userText, lang)
            if (learned) {
                result = { text: learned, type: 'ai' }
            } else {
                // ---- try a real casual-chat match (free, fast — before calling AURYN) ----
                const casual = lang === 'en' ? await getCasualResponse(userText) : null
                if (casual) {
                    result = { text: casual, type: 'ai' }
                } else {
                    // ---- own model fallback: AURYN-v0.1 ----
                    const auryn = await askAuryn(userText)
                    if (auryn) {
                        result = { text: auryn, type: 'ai' }
                    } else {
                        // ---- genuinely stuck: log it as a suggestion ----
                        await logSuggestion(userText, lang)
                        result = { text: pick(patternBank.unknown[lang]), type: 'ai' }
                    }
                }
            }
        }

        // ---- EMOTIONAL LAYER: validate-first prefix, and a continuity check-in if the same feeling recurs ----
        if (emotion !== 'neutral' && intent !== 'trust_score_query' && intent !== 'marketplace_query') {
            const validateKey = 'validate_' + emotion
            let prefix = pick(patternBank[validateKey][lang])
            if (needsContinuityCheckin(emotion)) prefix += ' ' + pick(patternBank.continuity_checkin[lang])
            // occasionally blend in a real human phrase (English only — dataset is English)
            if (lang === 'en' && Math.random() < 0.3) {
                const humanLine = await getHumanEmotionPhrase(emotion)
                if (humanLine) prefix += ' ' + humanLine
            }
            result = { text: prefix, type: result.type }
        }

        await logConversation(userText, emotion, intent, result.text)
        return result
    }

    // ---- REAL-CASUAL-CHAT LAYER: keyword-matched real dost-jaisi replies from DailyDialog ----
    async function getCasualResponse(userText) {
        const stopWords = ['the','a','an','is','are','was','were','do','you','i','me','my','to','of','and','hai','ka','ki','ke','main','mujhe','tu','tera']
        const words = userText.toLowerCase().replace(/[^a-z0-9\u0900-\u097F\s]/g, '').split(/\s+/)
        const keyword = words.filter(w => w.length > 3 && !stopWords.includes(w))[0]
        if (!keyword) return null

        const { data } = await db
            .from('casual_conversations')
            .select('message')
            .ilike('message', `%${keyword}%`)
            .limit(20)

        if (!data || data.length === 0) return null
        return data[Math.floor(Math.random() * data.length)].message.trim()
    }

    async function getLearnedResponse(userText, lang) {
        const lower = userText.toLowerCase()
        let tag = 'casual'
        if (/(good|great|solid|trust|helpful|badhiya|achha|shandar)/.test(lower)) tag = 'praise'
        if (/(careful|scam|fraud|fake|red flag|risky|dhyan|dhoka)/.test(lower)) tag = 'warning'

        const { data } = await db
            .from('learned_patterns')
            .select('content')
            .eq('tag', tag)
            .eq('language', lang)
            .order('created_at', { ascending: false })
            .limit(20)

        if (!data || data.length === 0) return null
        return data[Math.floor(Math.random() * data.length)].content
    }

    const chatEl = document.getElementById('chat')

    function addMessage(text, type) {
        const div = document.createElement('div')
        div.className = 'msg-bubble ' + type
        div.textContent = text
        chatEl.appendChild(div)
        chatEl.scrollTop = chatEl.scrollHeight
    }

    function handleSend() {
        const input = document.getElementById('userInput')
        const text = input.value.trim()
        if (!text) return
        addMessage(text, 'user')
        input.value = ''
        setTimeout(async function() {
            const res = await buildResponse(text)
            addMessage(res.text, res.type)
        }, 400)
    }

    document.getElementById('userInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') handleSend() })

    function openAurea() {
        // future: switch conversation context when more contacts exist
    }

    addMessage(pick(patternBank.greeting.en), 'ai')
</script>
